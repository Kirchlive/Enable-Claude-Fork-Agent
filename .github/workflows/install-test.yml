name: install-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  posix:
    name: install.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Stub claude binary (returns 2.1.143)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/stub"
          cat > "$GITHUB_WORKSPACE/stub/claude" <<'EOF'
          #!/usr/bin/env bash
          case "$1" in
            --version) echo "2.1.143 (Claude Code)";;
            *) echo "stub claude";;
          esac
          EOF
          chmod +x "$GITHUB_WORKSPACE/stub/claude"
          echo "$GITHUB_WORKSPACE/stub" >> "$GITHUB_PATH"

      - name: Verify python3
        run: python3 --version

      - name: Run install.sh
        run: bash install.sh

      - name: Assert env var merged
        run: |
          test -f "$HOME/.claude/settings.json"
          grep -q '"CLAUDE_CODE_FORK_SUBAGENT": "1"' "$HOME/.claude/settings.json"

      - name: Assert skills installed
        run: |
          test -f "$HOME/.claude/skills/prefer-fork-agents/SKILL.md"
          test -f "$HOME/.claude/skills/fork-fan-out/SKILL.md"

      - name: Assert backup file produced when re-running
        run: |
          bash install.sh
          ls "$HOME/.claude"/settings.json.pre-fork-backup-* >/dev/null

      - name: --check reports installed state
        run: bash install.sh --check | grep -i "CLAUDE_CODE_FORK_SUBAGENT.*set"

      - name: --dry-run leaves no new mutations
        run: |
          before="$(stat -f %m "$HOME/.claude/settings.json" 2>/dev/null || stat -c %Y "$HOME/.claude/settings.json")"
          sleep 1
          bash install.sh --dry-run
          after="$(stat -f %m "$HOME/.claude/settings.json" 2>/dev/null || stat -c %Y "$HOME/.claude/settings.json")"
          test "$before" = "$after"

      - name: --uninstall --yes restores backup
        run: |
          bash install.sh --uninstall --yes
          ! test -d "$HOME/.claude/skills/prefer-fork-agents"
          ! test -d "$HOME/.claude/skills/fork-fan-out"

  windows:
    name: install.ps1 (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stub claude binary (returns 2.1.143)
        shell: pwsh
        run: |
          $stub = Join-Path $env:GITHUB_WORKSPACE 'stub'
          New-Item -ItemType Directory -Path $stub -Force | Out-Null
          @'
          param([Parameter(ValueFromRemainingArguments=$true)]$args)
          if ($args -contains '--version') { 'claude 2.1.143' } else { 'stub claude' }
          '@ | Set-Content -Path (Join-Path $stub 'claude.ps1') -Encoding UTF8
          @'
          @echo off
          pwsh -NoProfile -File "%~dp0claude.ps1" %*
          '@ | Set-Content -Path (Join-Path $stub 'claude.cmd') -Encoding ASCII
          Add-Content $env:GITHUB_PATH $stub

      - name: Run install.ps1
        shell: pwsh
        run: ./install.ps1

      - name: Assert env var merged
        shell: pwsh
        run: |
          $settings = Join-Path $HOME '.claude/settings.json'
          if (-not (Test-Path $settings)) { throw "settings.json not created" }
          $raw = Get-Content -Raw $settings
          if ($raw -notmatch '"CLAUDE_CODE_FORK_SUBAGENT"\s*:\s*"1"') { throw "env var not merged" }

      - name: Assert skills installed
        shell: pwsh
        run: |
          if (-not (Test-Path (Join-Path $HOME '.claude/skills/prefer-fork-agents/SKILL.md'))) { throw "missing prefer-fork-agents" }
          if (-not (Test-Path (Join-Path $HOME '.claude/skills/fork-fan-out/SKILL.md'))) { throw "missing fork-fan-out" }

      - name: --check reports installed state
        shell: pwsh
        run: |
          $out = ./install.ps1 -Check
          if ($out -notmatch 'CLAUDE_CODE_FORK_SUBAGENT.*set') { throw "check output unexpected: $out" }

      - name: --dry-run leaves no new mutations
        shell: pwsh
        run: |
          $settings = Join-Path $HOME '.claude/settings.json'
          $before = (Get-Item $settings).LastWriteTime
          Start-Sleep -Seconds 1
          ./install.ps1 -DryRun
          $after = (Get-Item $settings).LastWriteTime
          if ($before -ne $after) { throw "dry-run mutated settings.json" }

      - name: -Uninstall -Yes restores backup
        shell: pwsh
        run: |
          ./install.ps1 -Uninstall -Yes
          if (Test-Path (Join-Path $HOME '.claude/skills/prefer-fork-agents')) { throw "skill not removed" }
          if (Test-Path (Join-Path $HOME '.claude/skills/fork-fan-out')) { throw "skill not removed" }
